<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Leadership Journey · Candice Walker</title>

  <style>
    /* 1. AGGRESSIVE RESET: Removes all hidden margins/padding */
    * {
      margin: 0 !important;
      padding: 0 !important;
      box-sizing: border-box;
    }

    html, body {
      background-color: #2d0808; /* Matches your background exactly */
      width: 100%;
      height: 100%;
      overflow: hidden; /* Prevents scrollbars from creating white gaps */
    }

    /* 2. BACKGROUND CONTAINER: Forces the red to fill the whole screen */
    #_bundler_thumbnail {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2d0808;
      z-index: 9999;
    }

    /* 3. LOADING OVERLAY: Made transparent to hide the white box */
    #__bundler_loading {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif;
      color: #999; /* Lightened text so it's subtle on dark red */
      background: transparent; /* Removed white background */
      padding: 8px 14px;
      z-index: 10000;
    }

    /* SVG Styling for your logo/icon */
    svg {
      width: 64px;
      height: 64px;
      fill: #fff;
    }
  </style>
</head>
<body>

  <div id="_bundler_thumbnail">
    <svg viewBox="0 0 24 24">
      <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" />
    </svg>
  </div>

  <div id="__bundler_loading">Unpacking...</div>

  <script>
    // This is the logic that loads your actual site content
    (async () => {
      const setStatus = (text) => {
        const el = document.getElementById('__bundler_loading');
        if (el) el.textContent = text;
      };

      try {
        // Since this is a template, your site content will be 
        // injected here by the bundler when you view the live site.
        setStatus('Journey Loading...');
      } catch (err) {
        setStatus('Error: ' + err.message);
      }
    })();
  </script>

</body>
</html>
